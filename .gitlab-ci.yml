image: maven:3.9-eclipse-temurin-17

# This block controls the entire pipeline trigger logic
workflow:
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"
    - when: never # Don't run for any other branches

stages:
  - build
  - test
  - archive

cache:
  paths:
    - .m2/repository

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository"

build_job:
  stage: build
  script:
    - echo "Running Maven build..."
    - mvn clean package -DskipTests
  artifacts:
    paths:
      - target/*.jar
    expire_in: 1 week

test_job:
  stage: test
  script:
    - echo "Running Maven tests..."
    - mvn test

archive_job:
  stage: archive
  script:
    - echo "Archiving .jar..."
    - mkdir -p built
    - cp target/*.jar built/
  artifacts:
    paths:
      - built/*.jar
    expire_in: never
  # This acts like your Jenkins 'post' success/failure block
  after_script:
    - >
      if [ $CI_JOB_STATUS == 'success' ]; then
        echo "Build & Test successful. .jar stored in built/";
      else
        echo "Build or Tests failed!";
      fi