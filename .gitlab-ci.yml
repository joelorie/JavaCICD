# Use a Maven image to provide the environment
image: maven:3.9-eclipse-temurin-17

# Define the order of stages
stages:
  - build
  - test
  - archive

# Global cache to speed up Maven builds by storing dependencies
cache:
  paths:
    - .m2/repository

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository"

build_job:
  stage: build
  script:
    - echo "Running Maven build..."
    - mvn clean package -DskipTests
  artifacts:
    paths:
      - target/*.jar
    expire_in: 1 week

test_job:
  stage: test
  script:
    - echo "Running Maven tests..."
    - mvn test

archive_job:
  stage: archive
  script:
    - echo "Archiving .jar..."
    - mkdir -p built
    - cp target/*.jar built/
  artifacts:
    paths:
      - built/*.jar
    expire_in: never  # Keep these indefinitely like Jenkins archiveArtifacts
  after_script:
    - echo "Build & Test successful. .jar stored in built/"

